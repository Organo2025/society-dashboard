<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORGANO OFM DASHBOARD</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay"></div>

<div class="dashboard">

<!-- ================= HEADER ================= -->

<header>

<div class="logo">
<img src="assets/logo.png" alt="Organo">
</div>

<div class="title">
<h1>ORGANO ANTHARAM</h1>
<p>Daily OFM Dashboard</p>
</div>

<div class="headerRight">

<div id="weather">
Loading Weather...
</div>

<div id="currentDate"></div>

<div id="currentTime"></div>

</div>

</header>

<!-- ================= MAIN GRID ================= -->

<div class="mainGrid">

<!-- LEFT COLUMN -->

<div class="leftColumn">

<!-- ENERGY -->

<section class="section energy">

<h2>⚡ ENERGY</h2>

<div class="cards" id="energyCards"></div>

</section>

<!-- VISITORS -->

<section class="section visitors">

<h2>👥 VISITORS</h2>

<div class="cards" id="visitorCards"></div>

</section>

<!-- DG -->

<section class="section dg">

<h2>⛽ DIESEL GENERATORS</h2>

<div class="cards" id="dgCards"></div>

</section>

</div>

<!-- RIGHT COLUMN -->

<div class="rightColumn">

<!-- WATER -->

<section class="section water">

<h2>💧 WATER</h2>

<div class="cards" id="waterCards"></div>

</section>

<!-- CCTV -->

<section class="section cctv">

<h2>📷 CCTV STATUS</h2>

<div class="cards" id="cctvCards"></div>

</section>

<!-- AMENITIES -->

<section class="section amenities">

<h2>🏠 AMENITIES</h2>

<div class="cards" id="amenityCards"></div>

</section>

</div>
<!-- ================= AIR QUALITY ================= -->

<section class="section air fullWidth">

<h2>🌍 AIR QUALITY</h2>

<div class="cards" id="airCards"></div>

</section>

</div>

</div>

<footer>

Organo Eco Habitats Pvt Ltd

</footer>

</body>

<script src="script.js"></script>

</html>
