<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORGANO OFM Dashboard V9</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Background -->
<div class="backgroundOverlay"></div>

<div class="dashboard">

    <!-- ================= HEADER ================= -->

    <header class="topBar">

        <div class="logoArea">

            <img src="assets/logo.png" alt="Organo Logo">

        </div>

        <div class="titleArea">

            <h1>ORGANO ANTHARAM</h1>

            <p>Daily OFM Dashboard</p>

        </div>

        <div class="weatherArea">

            <div id="weather">

                Loading Weather...

            </div>

            <div id="currentDate"></div>

            <div id="currentTime"></div>

        </div>

    </header>

    <!-- ================= KPI CARDS ================= -->

    <section class="kpiContainer">

        <div class="kpiCard">

            <div class="icon">⚡</div>

            <div class="label">Grid Energy</div>

            <div class="value" id="gridEnergy">--</div>

        </div>

        <div class="kpiCard">

            <div class="icon">☀️</div>

            <div class="label">Solar</div>

            <div class="value" id="solarGeneration">--</div>

        </div>

        <div class="kpiCard">

            <div class="icon">⛽</div>

            <div class="label">DG Units</div>

            <div class="value" id="dgUnits">--</div>

        </div>

        <div class="kpiCard">

            <div class="icon">🛢</div>

            <div class="label">Diesel</div>

            <div class="value" id="diesel">--</div>

        </div>

        <div class="kpiCard">

            <div class="icon">💧</div>

            <div class="label">Water</div>

            <div class="value" id="water">--</div>

        </div>

        <div class="kpiCard">

            <div class="icon">🌍</div>

            <div class="label">AQI</div>

            <div class="value" id="aqi">--</div>

        </div>

        <div class="kpiCard">

            <div class="icon">🐝</div>

            <div class="label">Hive</div>

            <div class="value" id="hive">--</div>

        </div>

        <div class="kpiCard">

            <div class="icon">🚰</div>

            <div class="label">STP</div>

            <div class="value" id="stp">--</div>

        </div>

    </section>

    <!-- ================= MAIN ================= -->

    <main class="mainContent">

        <!-- LEFT PANEL -->

        <aside class="statusPanel">

            <div class="panelTitle">

                📊 DAILY STATUS

            </div>

            <table id="statusTable">

                <thead>

                    <tr>

                        <th>Parameter</th>

                        <th>Value</th>

                        <th>Unit</th>

                    </tr>

                </thead>

                <tbody id="dashboardData">

                </tbody>

            </table>

        </aside>

        <!-- RIGHT PANEL -->

        <section class="imagePanel">

            <div class="heroImage">

            </div>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        © 2026 Organo Eco Habitats Pvt. Ltd.

    </footer>

</div>

<script src="script.js"></script>

</body>

</html>
