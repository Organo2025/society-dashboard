<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORGANO OFM Dashboard V8</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Background Overlay -->
<div class="overlay"></div>

<!-- ===========================
     DASHBOARD
=========================== -->

<div class="dashboard">

    <!-- ===========================
         HEADER
    =========================== -->

    <header>

        <!-- Logo -->

        <div class="logo">

            <img src="assets/logo.png" alt="Organo">

        </div>

        <!-- Title -->

        <div class="title">

            <h1>ORGANO ANTHARAM</h1>

            <p>Daily OFM Dashboard</p>

        </div>

        <!-- Weather -->

        <div class="headerRight">

            <div id="weather">

                Loading Weather...

            </div>

            <div id="currentDate"></div>

            <div id="currentTime"></div>

        </div>

    </header>



    <!-- ===========================
         MAIN CONTENT
    =========================== -->

    <main class="content">



        <!-- ===================
             LEFT PANEL
        ==================== -->

        <aside class="leftPanel">

            <div class="statusBox">

                <h2>

                    📊 DAILY STATUS

                </h2>



                <table id="statusTable">

                    <thead>

                        <tr>

                            <th>Parameter</th>

                            <th>Value</th>

                            <th>Unit</th>

                        </tr>

                    </thead>

                    <tbody id="dashboardData">

                        <!-- Filled by JavaScript -->

                    </tbody>

                </table>

            </div>

        </aside>



        <!-- ===================
             RIGHT PANEL
        ==================== -->

        <section class="rightPanel">

            <div class="heroImage">

                <!-- Optional Future Content -->

                <div class="imageOverlay">

                    <div class="welcome">

                        <!-- Future Widgets -->

                    </div>

                </div>

            </div>

        </section>



    </main>



    <!-- ===========================
         FOOTER
    =========================== -->

    <footer>

        © 2026 Organo Eco Habitats Pvt. Ltd.

    </footer>



</div>



<script src="script.js"></script>

</body>

</html>
