<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ORGANO OFM DASHBOARD</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay"></div>

<div class="dashboard">

<!--==================================================
HEADER
===================================================-->

<header>

<div class="logo">

<img src="assets/logo.png"
alt="Organo Logo">

</div>

<div class="title">

<h1>ORGANO ANTHARAM</h1>

<p>Daily OFM Dashboard</p>

</div>

<div class="headerRight">

<div id="weather">

Loading Weather...

</div>

<div id="currentDate"></div>

<div id="currentTime"></div>

</div>

</header>

<!--==================================================
MAIN GRID
===================================================-->

<div class="mainGrid">

<!--=====================
LEFT COLUMN
======================-->

<div class="leftColumn">

<section class="section energy">

<h2>⚡ Energy</h2>

<div
class="cards"
id="energyCards">

</div>

</section>

<section class="section dg">

<h2>⛽ Diesel Generators</h2>

<div
class="cards"
id="dgCards">

</div>

</section>

</div>

<!--=====================
RIGHT COLUMN
======================-->

<div class="rightColumn">

<section class="section water">

<h2>💧 Water</h2>

<div
class="cards"
id="waterCards">

</div>

</section>

<section class="section amenities">

<h2>🏠 Amenities</h2>

<div
class="cards"
id="amenityCards">

</div>

</section>

</div>

<!--=====================
AIR QUALITY
======================-->

<section
class="section air fullWidth">

<h2>🌍 Air Quality</h2>

<div
class="cards"
id="airCards">
</div>

</section>

</div>

<!--==================================================
FOOTER
===================================================-->

<footer>

© 2026 Organo Eco Habitats Pvt. Ltd.
&nbsp;|&nbsp;
Daily OFM Dashboard

</footer>

</div>

<!--==================================================
JAVASCRIPT
===================================================-->

<script src="script.js"></script>

</body>

</html>
